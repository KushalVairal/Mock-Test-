<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mock Exam Hall — AI Mock Test</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#E7EAE5;
    --paper-dot:#C7CEC6;
    --surface:#FFFFFF;
    --ink:#202A24;
    --ink-soft:#5C6660;
    --border:#B9C2BB;
    --stamp-red:#BD3B3B;
    --pen-blue:#2155CD;
    --pass-green:#2F7A4D;
    --shadow:0 6px 18px rgba(32,42,36,0.10);
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    min-height:100vh;
    font-family:'IBM Plex Sans', sans-serif;
    color:var(--ink);
    background-color:var(--paper);
    background-image:radial-gradient(var(--paper-dot) 1px, transparent 1px);
    background-size:22px 22px;
    padding:32px 16px 64px;
  }

  .page{ max-width:720px; margin:0 auto; }

  .masthead{
    text-align:center;
    padding-bottom:18px;
    margin-bottom:28px;
    border-bottom:2px dashed var(--border);
  }
  .masthead-tag{
    display:inline-block;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:.14em;
    color:var(--ink-soft);
    border:1px solid var(--border);
    border-radius:3px;
    padding:2px 8px;
    margin-bottom:10px;
  }
  .masthead h1{
    font-family:'Special Elite', monospace;
    font-weight:400;
    font-size:clamp(28px,5vw,38px);
    margin:0 0 6px;
    letter-spacing:.01em;
  }
  .masthead-sub{ margin:0; color:var(--ink-soft); font-size:14.5px; }

  .card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:10px;
    box-shadow:var(--shadow);
    padding:28px 26px;
    animation:rise .35s ease both;
  }
  @keyframes rise{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }
  .hidden{ display:none !important; }

  /* ---------- Setup / admit card ---------- */
  .admit-card .section-label{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:.12em;
    color:var(--ink-soft);
    margin:0 0 16px;
  }
  .field{ margin-bottom:18px; }
  .field label{
    display:block;
    font-size:13px;
    font-weight:600;
    margin-bottom:6px;
    color:var(--ink);
  }
  .field input{
    width:100%;
    font-family:'IBM Plex Sans', sans-serif;
    font-size:15px;
    padding:11px 12px;
    border:1px solid var(--border);
    border-radius:6px;
    background:#FCFCFA;
    color:var(--ink);
  }
  .field input:focus-visible{
    outline:2px solid var(--pen-blue);
    outline-offset:1px;
  }
  .field-row{ display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .field-hint{ font-size:12px; color:var(--ink-soft); margin-top:4px; }

  .btn{
    font-family:'IBM Plex Mono', monospace;
    font-weight:600;
    font-size:14px;
    letter-spacing:.04em;
    text-transform:uppercase;
    border:none;
    border-radius:6px;
    padding:13px 22px;
    cursor:pointer;
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .btn:focus-visible{ outline:2px solid var(--ink); outline-offset:2px; }
  .btn-primary{ background:var(--ink); color:var(--paper); width:100%; }
  .btn-primary:hover:not(:disabled){ transform:translateY(-1px); box-shadow:0 4px 10px rgba(0,0,0,.18); }
  .btn-primary:disabled{ opacity:.45; cursor:not-allowed; }

  /* ---------- Test screen ---------- */
  .exam-topbar{
    display:flex;
    flex-wrap:wrap;
    gap:14px;
    align-items:center;
    justify-content:space-between;
    border-bottom:1px solid var(--border);
    padding-bottom:16px;
    margin-bottom:20px;
  }
  .topbar-field{ font-size:12.5px; color:var(--ink-soft); }
  .topbar-field span{ display:block; font-family:'IBM Plex Mono', monospace; font-size:10px; letter-spacing:.1em; text-transform:uppercase; }
  .topbar-field strong{ display:block; font-size:14px; color:var(--ink); font-weight:600; margin-top:2px; max-width:160px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

  .timer{
    font-family:'IBM Plex Mono', monospace;
    display:flex;
    align-items:baseline;
    gap:4px;
    border:2px solid var(--ink);
    border-radius:8px;
    padding:8px 14px;
    transition:border-color .2s, color .2s;
  }
  .timer #timer-value{ font-size:26px; font-weight:700; line-height:1; }
  .timer small{ font-size:10px; color:var(--ink-soft); text-transform:uppercase; }
  .timer.danger{ border-color:var(--stamp-red); color:var(--stamp-red); animation:pulse 1s infinite; }
  .timer.danger small{ color:var(--stamp-red); }
  @keyframes pulse{ 0%,100%{ opacity:1; } 50%{ opacity:.55; } }

  .loading{ display:flex; flex-direction:column; align-items:center; gap:14px; padding:50px 0; color:var(--ink-soft); font-size:13.5px; }
  .clock-spin{ width:42px; height:42px; border-radius:50%; border:2px solid var(--border); position:relative; }
  .clock-spin::after{
    content:''; position:absolute; top:50%; left:50%; width:2px; height:16px;
    background:var(--ink); transform-origin:bottom center; transform:translate(-50%,-100%);
    animation:tick 1.2s linear infinite;
  }
  @keyframes tick{ to{ transform:translate(-50%,-100%) rotate(360deg); } }

  .question-text{ font-size:18px; line-height:1.5; font-weight:500; margin:0 0 22px; }

  .options{ display:flex; flex-direction:column; gap:10px; margin-bottom:24px; }
  .option{
    display:flex;
    align-items:center;
    gap:14px;
    width:100%;
    text-align:left;
    background:#FCFCFA;
    border:1px solid var(--border);
    border-radius:8px;
    padding:13px 16px;
    cursor:pointer;
    font-family:'IBM Plex Sans', sans-serif;
    font-size:15px;
    color:var(--ink);
    transition:border-color .15s, background .15s;
  }
  .option:hover{ border-color:var(--ink-soft); }
  .option:focus-visible{ outline:2px solid var(--pen-blue); outline-offset:2px; }
  .option.selected{ border-color:var(--pen-blue); background:#F1F5FE; }

  .bubble{
    position:relative;
    flex:0 0 auto;
    width:30px; height:30px;
    border-radius:50%;
    border:2px solid var(--ink);
    display:flex; align-items:center; justify-content:center;
    font-family:'IBM Plex Mono', monospace;
    font-size:13px; font-weight:600;
    color:var(--ink);
    overflow:visible;
  }
  .bubble.selected{ border-color:var(--pen-blue); color:#fff; }
  .bubble.selected::after{
    content:'';
    position:absolute; inset:2px;
    border-radius:50%;
    background:var(--pen-blue);
    filter:url(#pencil-fill);
    z-index:-1;
  }

  /* ---------- Results ---------- */
  .results-card{ text-align:center; }
  .stamp{
    width:128px; height:128px;
    margin:6px auto 18px;
    border-radius:50%;
    border:4px double var(--ink);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    transform:rotate(-7deg);
    position:relative;
  }
  .stamp::before{
    content:'';
    position:absolute; inset:-6px;
    border-radius:50%;
    background:currentColor;
    opacity:.08;
    filter:url(#pencil-fill);
  }
  .stamp.pass{ color:var(--pass-green); border-color:var(--pass-green); }
  .stamp.fail{ color:var(--stamp-red); border-color:var(--stamp-red); }
  .stamp #score-value{ font-family:'IBM Plex Mono', monospace; font-size:26px; font-weight:700; }
  .stamp-label{ font-family:'IBM Plex Mono', monospace; font-size:10px; letter-spacing:.16em; margin-top:2px; }

  .results-card h2{ font-family:'Special Elite', monospace; font-weight:400; font-size:22px; margin:0 0 4px; }
  .results-meta{ color:var(--ink-soft); font-size:13.5px; margin:0 0 22px; }

  .results-table{ width:100%; border-collapse:collapse; margin-bottom:24px; }
  .results-table td{ padding:11px 4px; border-bottom:1px solid var(--border); font-size:14.5px; text-align:left; }
  .results-table td:last-child{ text-align:right; font-family:'IBM Plex Mono', monospace; font-weight:600; }
  .results-table tr:last-child td{ border-bottom:none; }

  .error-banner{
    background:#FBEAEA; border:1px solid var(--stamp-red); color:#7A2424;
    border-radius:8px; padding:12px 14px; font-size:13.5px; margin-bottom:18px;
  }

  @media (prefers-reduced-motion: reduce){
    .card, .timer.danger, .clock-spin::after{ animation:none !important; }
  }

  @media (max-width:480px){
    .field-row{ grid-template-columns:1fr; }
    .exam-topbar{ flex-direction:column; align-items:flex-start; }
    .timer{ align-self:flex-end; }
  }
</style>
</head>
<body>

<!-- SVG filter used to give bubble fills and the result stamp an irregular, hand-marked edge -->
<svg width="0" height="0" style="position:absolute">
  <filter id="pencil-fill">
    <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="6"/>
  </filter>
</svg>

<div class="page">
  <header class="masthead">
    <span class="masthead-tag">FORM 7-B · MOCK EXAM</span>
    <h1>Mock Exam Hall</h1>
    <p class="masthead-sub">Timed practice for any exam. Fresh questions, generated on the spot.</p>
  </header>

  <main>
    <!-- ===== Setup screen ===== -->
    <section id="setup-screen" class="card admit-card">
      <p class="section-label">CANDIDATE DETAILS</p>
      <form id="setup-form">
        <div class="field">
          <label for="candidate-name">Candidate name</label>
          <input type="text" id="candidate-name" placeholder="e.g. Kushal san" required>
        </div>
        <div class="field">
          <label for="exam-topic">Exam topic</label>
          <input type="text" id="exam-topic" placeholder="e.g. UPSC Polity, NEET Biology, IBPS SO IT Officer" required>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="seconds-per-q">Time per question (sec)</label>
            <input type="number" id="seconds-per-q" min="10" max="180" value="45" required>
          </div>
          <div class="field">
            <label for="total-questions">Number of questions</label>
            <input type="number" id="total-questions" min="1" max="20" value="10" required>
          </div>
        </div>
        <p class="field-hint" id="form-error" style="display:none; color:var(--stamp-red);"></p>
        <button type="submit" class="btn btn-primary">Begin Exam</button>
      </form>
    </section>

    <!-- ===== Test screen ===== -->
    <section id="test-screen" class="card exam-card hidden">
      <div class="exam-topbar">
        <div class="topbar-field"><span>Candidate</span><strong id="tb-name"></strong></div>
        <div class="topbar-field"><span>Exam</span><strong id="tb-topic"></strong></div>
        <div class="topbar-field"><span>Question</span><strong id="tb-progress"></strong></div>
        <div class="timer" id="timer"><span id="timer-value">45</span><small>sec left</small></div>
      </div>

      <div id="error-area"></div>

      <div id="loading" class="loading hidden">
        <div class="clock-spin"></div>
        <span>Fetching the next question…</span>
      </div>

      <div id="question-content">
        <p class="question-text" id="question-text"></p>
        <div class="options" id="options-list"></div>
      </div>

      <button id="submit-btn" class="btn btn-primary" disabled>Submit Answer</button>
    </section>

    <!-- ===== Results screen ===== -->
    <section id="results-screen" class="card results-card hidden">
      <div class="stamp" id="score-stamp">
        <span id="score-value">0/0</span>
        <span class="stamp-label">SCORE</span>
      </div>
      <h2>Answer Key Summary</h2>
      <p class="results-meta" id="results-meta"></p>
      <table class="results-table">
        <tr><td>Total questions</td><td id="res-total">0</td></tr>
        <tr><td>Correct</td><td id="res-correct">0</td></tr>
        <tr><td>Incorrect</td><td id="res-incorrect">0</td></tr>
        <tr><td>Skipped</td><td id="res-skipped">0</td></tr>
      </table>
      <button id="retry-btn" class="btn btn-primary">Take Another Test</button>
    </section>
  </main>
</div>

<script>
(function(){
  "use strict";

  // ---- Configuration -----------------------------------------------
  // If you deploy the frontend on the SAME Vercel project as the API
  // (recommended — see README), leave this as a relative path.
  // If you host the frontend somewhere else (e.g. GitHub Pages),
  // replace this with your full Vercel URL, e.g.
  // 'https://your-app.vercel.app/api/generate-question'
  const API_URL = '/api/generate-question';

  // ---- DOM refs -------------------------------------------------------
  const setupScreen   = document.getElementById('setup-screen');
  const testScreen    = document.getElementById('test-screen');
  const resultsScreen = document.getElementById('results-screen');

  const setupForm   = document.getElementById('setup-form');
  const formError   = document.getElementById('form-error');

  const tbName     = document.getElementById('tb-name');
  const tbTopic    = document.getElementById('tb-topic');
  const tbProgress = document.getElementById('tb-progress');
  const timerBox   = document.getElementById('timer');
  const timerValue = document.getElementById('timer-value');

  const errorArea      = document.getElementById('error-area');
  const loadingEl      = document.getElementById('loading');
  const questionContent= document.getElementById('question-content');
  const questionText   = document.getElementById('question-text');
  const optionsList    = document.getElementById('options-list');
  const submitBtn      = document.getElementById('submit-btn');

  const scoreStamp   = document.getElementById('score-stamp');
  const scoreValue   = document.getElementById('score-value');
  const resultsMeta  = document.getElementById('results-meta');
  const resTotal     = document.getElementById('res-total');
  const resCorrect   = document.getElementById('res-correct');
  const resIncorrect = document.getElementById('res-incorrect');
  const resSkipped   = document.getElementById('res-skipped');
  const retryBtn     = document.getElementById('retry-btn');

  // ---- State ------------------------------------------------------
  let state = {
    name: '', topic: '', secondsPerQ: 45, totalQuestions: 10,
    currentIndex: 0, currentQuestion: null, selectedOption: null,
    answers: [], timerInterval: null, timeLeft: 0
  };

  function show(screen){
    [setupScreen, testScreen, resultsScreen].forEach(s => s.classList.add('hidden'));
    screen.classList.remove('hidden');
  }

  // ---- Setup form ---------------------------------------------------
  setupForm.addEventListener('submit', function(e){
    e.preventDefault();
    const name = document.getElementById('candidate-name').value.trim();
    const topic = document.getElementById('exam-topic').value.trim();
    const seconds = parseInt(document.getElementById('seconds-per-q').value, 10);
    const total = parseInt(document.getElementById('total-questions').value, 10);

    if (!name || !topic){
      formError.textContent = 'Please fill in your name and exam topic.';
      formError.style.display = 'block';
      return;
    }
    if (!seconds || seconds < 10 || seconds > 180){
      formError.textContent = 'Time per question should be between 10 and 180 seconds.';
      formError.style.display = 'block';
      return;
    }
    if (!total || total < 1 || total > 20){
      formError.textContent = 'Number of questions should be between 1 and 20.';
      formError.style.display = 'block';
      return;
    }
    formError.style.display = 'none';

    state = {
      name, topic, secondsPerQ: seconds, totalQuestions: total,
      currentIndex: 0, currentQuestion: null, selectedOption: null,
      answers: [], timerInterval: null, timeLeft: 0
    };

    tbName.textContent = name;
    tbTopic.textContent = topic;

    show(testScreen);
    loadQuestion();
  });

  // ---- Question loading ---------------------------------------------
  async function loadQuestion(){
    if (state.currentIndex >= state.totalQuestions){
      showResults();
      return;
    }

    errorArea.innerHTML = '';
    clearTimer();
    questionContent.classList.add('hidden');
    submitBtn.disabled = true;
    loadingEl.classList.remove('hidden');
    tbProgress.textContent = (state.currentIndex + 1) + ' / ' + state.totalQuestions;

    try{
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ topic: state.topic, questionNumber: state.currentIndex + 1 })
      });

      if (!res.ok){
        throw new Error('Server responded with status ' + res.status);
      }
      const data = await res.json();

      if (!data || typeof data.question !== 'string' || !Array.isArray(data.options) ||
          data.options.length !== 4 || typeof data.correct !== 'number' ||
          data.correct < 0 || data.correct > 3){
        throw new Error('Received an unexpected question format.');
      }

      state.currentQuestion = data;
      state.selectedOption = null;
      renderQuestion(data);
      loadingEl.classList.add('hidden');
      questionContent.classList.remove('hidden');
      startTimer();

    } catch(err){
      loadingEl.classList.add('hidden');
      handleFetchError(err);
    }
  }

  function renderQuestion(q){
    questionText.textContent = q.question;
    optionsList.innerHTML = '';
    q.options.forEach(function(optText, idx){
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'option';
      btn.setAttribute('data-index', idx);

      const bubble = document.createElement('span');
      bubble.className = 'bubble';
      bubble.textContent = String.fromCharCode(65 + idx);

      const label = document.createElement('span');
      label.className = 'option-text';
      label.textContent = optText;

      btn.appendChild(bubble);
      btn.appendChild(label);
      btn.addEventListener('click', function(){ selectOption(idx); });
      optionsList.appendChild(btn);
    });
    submitBtn.disabled = true;
  }

  function selectOption(idx){
    state.selectedOption = idx;
    const buttons = optionsList.querySelectorAll('.option');
    buttons.forEach(function(b){
      const i = parseInt(b.getAttribute('data-index'), 10);
      b.classList.toggle('selected', i === idx);
      b.querySelector('.bubble').classList.toggle('selected', i === idx);
    });
    submitBtn.disabled = false;
  }

  // ---- Timer ----------------------------------------------------------
  function startTimer(){
    state.timeLeft = state.secondsPerQ;
    updateTimerDisplay();
    state.timerInterval = setInterval(function(){
      state.timeLeft -= 1;
      updateTimerDisplay();
      if (state.timeLeft <= 0){
        clearTimer();
        recordAnswer(null); // timed out -> skipped
        nextQuestion();
      }
    }, 1000);
  }

  function updateTimerDisplay(){
    timerValue.textContent = Math.max(state.timeLeft, 0);
    timerBox.classList.toggle('danger', state.timeLeft <= 10);
  }

  function clearTimer(){
    if (state.timerInterval){
      clearInterval(state.timerInterval);
      state.timerInterval = null;
    }
  }

  // ---- Answer handling --------------------------------------------
  submitBtn.addEventListener('click', function(){
    if (state.selectedOption === null) return;
    clearTimer();
    recordAnswer(state.selectedOption);
    nextQuestion();
  });

  function recordAnswer(selectedIdx){
    const q = state.currentQuestion;
    let status;
    if (selectedIdx === null) status = 'skipped';
    else if (selectedIdx === q.correct) status = 'correct';
    else status = 'incorrect';

    state.answers.push({
      question: q.question,
      selected: selectedIdx,
      correct: q.correct,
      status: status
    });
  }

  function nextQuestion(){
    state.currentIndex += 1;
    loadQuestion();
  }

  // ---- Error handling --------------------------------------------
  function handleFetchError(err){
    console.error(err);
    errorArea.innerHTML = '<div class="error-banner">' +
      'We couldn\'t load the next question from the AI service. The test will end here so your progress is saved.' +
      '</div>';
    setTimeout(function(){ showResults(); }, 1800);
  }

  // ---- Results ------------------------------------------------------
  function showResults(){
    clearTimer();
    const total = state.answers.length;
    const correct = state.answers.filter(a => a.status === 'correct').length;
    const incorrect = state.answers.filter(a => a.status === 'incorrect').length;
    const skipped = state.answers.filter(a => a.status === 'skipped').length;

    scoreValue.textContent = correct + '/' + total;
    resultsMeta.textContent = state.name + ' — ' + state.topic;
    resTotal.textContent = total;
    resCorrect.textContent = correct;
    resIncorrect.textContent = incorrect;
    resSkipped.textContent = skipped;

    const passed = total > 0 && (correct / total) >= 0.5;
    scoreStamp.classList.remove('pass', 'fail');
    scoreStamp.classList.add(passed ? 'pass' : 'fail');

    show(resultsScreen);
  }

  retryBtn.addEventListener('click', function(){
    setupForm.reset();
    document.getElementById('seconds-per-q').value = 45;
    document.getElementById('total-questions').value = 10;
    show(setupScreen);
  });

})();
</script>
</body>
</html>
